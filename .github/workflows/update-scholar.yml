name: Update Google Scholar feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch publications from Google Scholar via SerpAPI
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: |
          python scripts/fetch_scholar.py

      - name: Commit and push updated publications.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet publications.json; then
            echo "No changes to publications.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -m "chore: update publications.json from Google Scholar"
          git push

